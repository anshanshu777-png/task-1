<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of Web Development</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header{
            background-color: #008080;
            color: white;
            padding: 20px;
        }

        .container{
            padding: 30px;
        }

        h2{
            color: #008080;
        }

        p{
            font-size: 18px;
            color: #333;
        }

        img{
            width: 250px;
            border-radius: 10px;
            margin: 15px;
        }

        a{
            text-decoration: none;
            color: white;
            background-color: #008080;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }

        button{
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background-color: orange;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkorange;
        }

    </style>
</head>

<body>

    <header>
        <h1>Basics of Web Development</h1>
    </header>

    <div class="container">

        <h2>Welcome to My First Task of ApexPlanet</h2>

        

       <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4"
        alt="Coding Image">

        <br>

        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>

        <br>

        <button onclick="showMessage()">
            Click Me
        </button>

    </div>

    <script>

        function showMessage(){
            alert("Hello! You clicked the button.");
        }

    </script>

</body>
</html>
